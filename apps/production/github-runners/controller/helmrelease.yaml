apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: arc-systems
spec:
  interval: 1h
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: ">=0.14.0 <0.15.0"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: arc-systems
      interval: 24h
  values:
    image:
      repository: ghcr.io/actions/gha-runner-scale-set-controller
      tag: "0.14.2" # {"$imagepolicy": "arc-systems:policy-arc-controller:tag"}
    flags:
      logFormat: "json"
    # Enable Prometheus metrics. Both the controller-manager and the
    # listener bind to :8080 /metrics.
    metrics:
      controllerManagerAddr: ":8080"
      listenerAddr: ":8080"
      listenerEndpoint: "/metrics"
    # Annotations let the existing kubernetes-pods scrape job in
    # monitoring/prometheus pick up controller metrics with no extra
    # scrape config.
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
