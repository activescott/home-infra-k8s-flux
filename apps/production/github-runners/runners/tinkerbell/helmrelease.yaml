apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tinkerbell-runners
  namespace: arc-runners
spec:
  interval: 1h
  dependsOn:
    - name: arc-controller
      namespace: arc-systems
  chart:
    spec:
      chart: gha-runner-scale-set
      version: ">=0.14.0 <0.15.0"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: arc-systems
      interval: 24h
  values:
    githubConfigUrl: https://github.com/activescott/tinkerbell
    githubConfigSecret: tinkerbell-github-token
    runnerScaleSetName: tinkerbell-runners
    minRunners: 0
    maxRunners: 2
    containerMode:
      type: dind
    # Annotations on the listener pod so the existing kubernetes-pods
    # Prometheus scrape config picks up gha_* metrics from :8080/metrics
    # (also requires the controller chart's `metrics:` block to be enabled
    # — see controller/helmrelease.yaml — and listenerMetrics below to
    # define which metrics this listener emits).
    listenerTemplate:
      metadata:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
          prometheus.io/path: "/metrics"
    listenerMetrics:
      counters:
        gha_started_jobs_total:
          labels:
            ["repository", "organization", "enterprise", "job_name", "event_name", "job_workflow_ref", "job_workflow_name", "job_workflow_target"]
        gha_completed_jobs_total:
          labels:
            ["repository", "organization", "enterprise", "job_name", "event_name", "job_result", "job_workflow_ref", "job_workflow_name", "job_workflow_target"]
      gauges:
        gha_assigned_jobs:
          labels: ["name", "namespace", "repository", "organization", "enterprise"]
        gha_running_jobs:
          labels: ["name", "namespace", "repository", "organization", "enterprise"]
        gha_registered_runners:
          labels: ["name", "namespace", "repository", "organization", "enterprise"]
        gha_busy_runners:
          labels: ["name", "namespace", "repository", "organization", "enterprise"]
        gha_min_runners:
          labels: ["name", "namespace", "repository", "organization", "enterprise"]
        gha_max_runners:
          labels: ["name", "namespace", "repository", "organization", "enterprise"]
        gha_desired_runners:
          labels: ["name", "namespace", "repository", "organization", "enterprise"]
        gha_idle_runners:
          labels: ["name", "namespace", "repository", "organization", "enterprise"]
      histograms:
        gha_job_startup_duration_seconds:
          labels:
            ["repository", "organization", "enterprise", "job_name", "event_name", "job_workflow_ref", "job_workflow_name", "job_workflow_target"]
        gha_job_execution_duration_seconds:
          labels:
            ["repository", "organization", "enterprise", "job_name", "event_name", "job_result", "job_workflow_ref", "job_workflow_name", "job_workflow_target"]
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:2.334.0 # {"$imagepolicy": "arc-runners:policy-actions-runner"}
            command: ["/home/runner/run.sh"]
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "4"
                memory: "6Gi"
