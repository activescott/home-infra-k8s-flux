apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml

namespace: arc-runners

secretGenerator:
  - name: tinkerbell-github-token
    envs:
      - .env.secret.github-token.encrypted
    options:
      # Helm chart references the secret by name string — no resource for
      # kustomize to follow, so the hash suffix would break the reference.
      disableNameSuffixHash: true
