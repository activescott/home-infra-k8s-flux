apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/image-scanning/semver

namespace: arc-runners

patches:
  # Customize ImageRepository
  - target:
      kind: ImageRepository
      name: repo-placeholder
    patch: |-
      - op: replace
        path: /metadata/name
        value: repo-actions-runner
      - op: replace
        path: /spec/image
        value: ghcr.io/actions/actions-runner
      # ghcr.io/actions/* images are public — no pull secret needed for scanning
      - op: remove
        path: /spec/secretRef

  # Customize ImagePolicy
  - target:
      kind: ImagePolicy
      name: policy-placeholder
    patch: |-
      - op: replace
        path: /metadata/name
        value: policy-actions-runner
      - op: replace
        path: /spec/imageRepositoryRef/name
        value: repo-actions-runner
      - op: replace
        path: /spec/policy/semver/range
        value: ">=2.0.0"

  # Customize ImageUpdateAutomation
  - target:
      kind: ImageUpdateAutomation
      name: update-placeholder
    patch: |-
      - op: replace
        path: /metadata/name
        value: update-actions-runner
