apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: grafana
      version: "11.3.6"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: monitoring
      interval: 24h
  values:
    replicas: 1

    persistence:
      enabled: true
      existingClaim: grafana-storage-pvc

    securityContext:
      runAsUser: 4020
      runAsGroup: 4020
      fsGroup: 4020

    # Disable the init container that chowns /var/lib/grafana — the hostPath
    # is already owned by 4020:4020 and the init container lacks permission.
    initChownData:
      enabled: false

    # Provision both Prometheus and Loki datasources
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus-server.monitoring.svc:80
            access: proxy
            isDefault: true
          - name: Loki
            type: loki
            url: http://loki.monitoring.svc:3100
            access: proxy

    resources:
      requests:
        cpu: "250m"
        memory: "750Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

    # Provision standard Kubernetes monitoring dashboards from grafana.com.
    # These two sections (dashboardProviders + dashboards) work together:
    # - dashboardProviders defines WHERE on disk Grafana looks for dashboard JSON files
    # - dashboards defines WHAT to download (by grafana.com ID) into that location
    # The Helm chart creates a ConfigMap + init container that downloads each gnetId
    # at deploy time. Removing these sections removes the provisioned dashboards on
    # next redeploy (dashboards only persist if saved to Grafana's own database).
    # Docs: https://github.com/grafana-community/helm-charts/blob/main/charts/grafana/values.yaml
    #        https://grafana.com/docs/grafana/latest/administration/provisioning/#dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: Kubernetes
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default

    # Each gnetId is a dashboard ID from https://grafana.com/grafana/dashboards/
    # Browse/search for dashboards at that URL and use the ID from the dashboard page.
    dashboards:
      default:
        # https://grafana.com/grafana/dashboards/15757
        k8s-global:
          gnetId: 15757
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
        # https://grafana.com/grafana/dashboards/15758
        k8s-namespaces:
          gnetId: 15758
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
        # https://grafana.com/grafana/dashboards/15759
        k8s-nodes:
          gnetId: 15759
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
        # https://grafana.com/grafana/dashboards/15760
        k8s-pods:
          gnetId: 15760
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
        # https://grafana.com/grafana/dashboards/1860
        node-exporter-full:
          gnetId: 1860
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

    # Ingress managed separately via raw K8s Ingress + cert-manager Certificate
    ingress:
      enabled: false

    # Pod annotations for Prometheus scraping
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "3000"

    # The Helm chart creates a service named "grafana" on port 80 by default
    service:
      enabled: true
      type: ClusterIP
      port: 80
      targetPort: 3000
