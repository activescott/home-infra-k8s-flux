apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  values:
    serverFiles:
      alerting_rules_gpupoet.yml:
        groups:
          - name: gpupoet
            rules:
              - alert: ProbeFailure
                expr: 'up{instance="gpupoet.com"} < 1.0'
                for: 60m
                labels:
                  severity: critical
                annotations:
                  summary: Probe failure. Check https://gpupoet.com/ops/metrics
              - alert: MissingMetricsFailure
                expr: 'scrape_samples_scraped{instance="gpupoet.com"} < 7.0'
                for: 60m
                labels:
                  severity: critical
                annotations:
                  summary: Missing metrics. Check https://gpupoet.com/ops/metrics
              - alert: CacheRevalidationJobFailure
                expr: 'coinpoet_last_job_success{instance="gpupoet.com"} == 0'
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: Cache revalidation job failed
                  description: The gpupoet cache revalidation cronjob has failed. Check the app logs and https://gpupoet.com/ops/metrics for details.
              - alert: AmazonSearchFailure
                expr: 'increase(coinpoet_amazon_searches_total{status="error",instance="gpupoet.com"}[1h]) > 3'
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: Multiple Amazon search failures in the last hour
                  description: More than 3 Amazon search errors in 1 hour. Check proxy config and amazon-searcher service.
              - alert: AmazonSearchStale
                expr: '(time() - coinpoet_amazon_last_success_timestamp_seconds{instance="gpupoet.com"}) > 7200'
                for: 30m
                labels:
                  severity: critical
                annotations:
                  summary: No successful Amazon searches in over 2 hours
                  description: Amazon searching has not succeeded in over 2 hours. Check amazon-searcher pod logs.
