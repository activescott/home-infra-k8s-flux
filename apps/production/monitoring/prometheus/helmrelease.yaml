apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: prometheus
      version: "28.6.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 24h
  values:
    # --- Prometheus Server ---
    server:
      enabled: true
      retention: "30d"
      retentionSize: "100GB"

      persistentVolume:
        enabled: true
        existingClaim: prometheus-storage-pvc

      securityContext:
        runAsUser: 4030
        runAsGroup: 4030
        fsGroup: 4030

      resources:
        limits:
          cpu: "1"
          memory: "2Gi"

      # Ingress managed separately via raw K8s Ingress + cert-manager Certificate
      ingress:
        enabled: false

      global:
        scrape_interval: 15s
        evaluation_interval: 15s

    # --- AlertManager ---
    alertmanager:
      enabled: true

      persistence:
        enabled: false

      extraSecretMounts:
        - name: alertmanager-telegram-secret
          mountPath: /etc/alertmanager/secrets
          secretName: alertmanager-secrets
          readOnly: true

      resources:
        limits:
          cpu: "1"
          memory: "1Gi"
        requests:
          cpu: "250m"
          memory: "250Mi"

    # --- AlertManager Configuration ---
    alertmanagerFiles:
      alertmanager.yml:
        global:
          resolve_timeout: 5m
        route:
          receiver: on_call_operator_default
          group_by:
            - alertname
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
        inhibit_rules:
          - source_match:
              severity: critical
            target_match:
              severity: warning
            equal:
              - alertname
              - job
              - instance
        receivers:
          - name: on_call_operator_default
            telegram_configs:
              - bot_token_file: /etc/alertmanager/secrets/telegram_bot_token
                send_resolved: true
                chat_id: 510755639

    # --- Alert Rules ---
    # All alerting rules go into the standard alerting_rules.yml key so they're
    # automatically included in Prometheus's rule_files without extra config.
    serverFiles:
      alerting_rules.yml:
        groups:
          - name: gpupoet
            rules:
              - alert: ProbeFailure
                expr: 'up{instance="gpupoet.com"} < 1.0'
                for: 60m
                labels:
                  severity: critical
                annotations:
                  summary: Probe failure. Check https://gpupoet.com/ops/metrics
              - alert: MissingMetricsFailure
                expr: 'scrape_samples_scraped{instance="gpupoet.com"} < 7.0'
                for: 60m
                labels:
                  severity: critical
                annotations:
                  summary: Missing metrics. Check https://gpupoet.com/ops/metrics
              - alert: CacheRevalidationJobFailure
                expr: 'coinpoet_last_job_success{instance="gpupoet.com"} == 0'
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: Cache revalidation job failed
                  description: The gpupoet cache revalidation cronjob has failed. Check the app logs and https://gpupoet.com/ops/metrics for details.
              - alert: AmazonSearchFailure
                expr: 'increase(coinpoet_amazon_searches_total{status="error",instance="gpupoet.com"}[1h]) > 4'
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: Multiple Amazon search failures in the last hour
                  description: More than 4 Amazon search errors in 1 hour. Check proxy config and amazon-searcher service.
              - alert: AmazonSearchStale
                expr: '(time() - coinpoet_amazon_last_success_timestamp_seconds{instance="gpupoet.com"}) > 7200'
                for: 30m
                labels:
                  severity: critical
                annotations:
                  summary: No successful Amazon searches in over 2 hours
                  description: Amazon searching has not succeeded in over 2 hours. Check amazon-searcher pod logs.
          - name: tayle
            rules:
              - alert: PodNotReady
                expr: 'kube_pod_status_ready{exported_namespace="tayle-prod",pod!~"^db-backup-.*",condition="false"} > 0'
                labels:
                  severity: warning
                annotations:
                  summary: >-
                    Tayle Pod not ready. See https://grafana.activescott.com/d/cc030cf0-cde1-46c1-bc49-fd5c88d7f002/tayle-prod-status
              - alert: DeploymentNotAvailable
                expr: 'kube_deployment_status_condition{exported_namespace="tayle-prod",condition="Available",status="false"} > 0'
                labels:
                  severity: critical
                annotations:
                  summary: >-
                    Tayle Deployment not available. See https://grafana.activescott.com/d/cc030cf0-cde1-46c1-bc49-fd5c88d7f002/tayle-prod-status
              - alert: StatefulSetNotReady
                expr: 'kube_statefulset_status_replicas_ready{exported_namespace="tayle-prod"} == 0'
                labels:
                  severity: critical
                annotations:
                  summary: >-
                    Tayle StatefulSet has no ready replicas. See https://grafana.activescott.com/d/cc030cf0-cde1-46c1-bc49-fd5c88d7f002/tayle-prod-status

    # --- Extra Scrape Configs ---
    extraScrapeConfigs: |
      - job_name: "gpupoet_cache_metrics"
        scrape_interval: 10s
        scrape_timeout: 10s
        metrics_path: "/ops/metrics"
        static_configs:
          - targets: ["gpupoet.com"]
      - job_name: "prometheus self scrape"
        static_configs:
          - targets: ["localhost:9090"]

    # Disable configmap-reload sidecar — config changes come via HelmRelease
    # updates which trigger pod restarts anyway.
    configmapReload:
      prometheus:
        enabled: false

    # --- Sub-charts ---
    kube-state-metrics:
      enabled: true

    prometheus-node-exporter:
      enabled: false

    prometheus-pushgateway:
      enabled: false
