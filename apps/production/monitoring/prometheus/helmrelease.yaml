apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: prometheus
      version: "28.6.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 24h
  values:
    # --- Prometheus Server ---
    server:
      enabled: true
      retention: "180d"
      retentionSize: "190GB"

      persistentVolume:
        enabled: true
        existingClaim: prometheus-storage-pvc

      securityContext:
        runAsUser: 4030
        runAsGroup: 4030
        fsGroup: 4030

      resources:
        limits:
          cpu: "1"
          memory: "2Gi"

      # Ingress managed separately via raw K8s Ingress + cert-manager Certificate
      ingress:
        enabled: false

      global:
        scrape_interval: 15s
        evaluation_interval: 15s

    # --- AlertManager ---
    alertmanager:
      enabled: true

      persistence:
        enabled: false

      extraSecretMounts:
        - name: alertmanager-telegram-secret
          mountPath: /etc/alertmanager/secrets
          secretName: alertmanager-secrets
          readOnly: true

      resources:
        limits:
          cpu: "1"
          memory: "1Gi"
        requests:
          cpu: "250m"
          memory: "250Mi"

      # Enable the AlertManager configmap-reload sidecar. Without this,
      # changes to .config below land in the ConfigMap but the running
      # pod keeps serving the old in-memory config until the next
      # restart. We hit this exact failure mode on 2026-05-17 — see
      # the comment on the prometheus configmapReload block below for
      # the full incident write-up.
      configmapReload:
        enabled: true

      # The chart's previous top-level `alertmanagerFiles.alertmanager.yml`
      # block was IGNORED — the chart renders AlertManager config from
      # `alertmanager.config` (nested under the subchart values). Our
      # config sat in the wrong path silently for ~110 days, so
      # AlertManager ran on the chart default (single "default-receiver"
      # with no notifier) and routed every alert into the void. Telegram
      # delivery never worked. Moving the config to the correct path here.
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: on_call_operator_default
          group_by:
            - alertname
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
        inhibit_rules:
          - source_match:
              severity: critical
            target_match:
              severity: warning
            equal:
              - alertname
              - job
              - instance
        receivers:
          - name: on_call_operator_default
            telegram_configs:
              - bot_token_file: /etc/alertmanager/secrets/telegram_bot_token
                send_resolved: true
                chat_id: 510755639

    # --- Alert Rules ---
    # All alerting rules go into the standard alerting_rules.yml key so they're
    # automatically included in Prometheus's rule_files without extra config.
    serverFiles:
      alerting_rules.yml:
        groups:
          - name: gpupoet
            rules:
              - alert: ProbeFailure
                expr: 'up{instance="gpupoet.com"} < 1.0'
                for: 60m
                labels:
                  severity: critical
                annotations:
                  summary: Probe failure. Check https://gpupoet.com/ops/metrics
              - alert: MissingMetricsFailure
                expr: 'scrape_samples_scraped{instance="gpupoet.com"} < 7.0'
                for: 60m
                labels:
                  severity: critical
                annotations:
                  summary: Missing metrics. Check https://gpupoet.com/ops/metrics
              - alert: CacheRevalidationJobFailure
                expr: 'coinpoet_last_job_success{instance="gpupoet.com"} == 0'
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: Cache revalidation job failed
                  description: The gpupoet cache revalidation cronjob has failed. Check the app logs and https://gpupoet.com/ops/metrics for details.
              - alert: AmazonSearchFailure
                expr: 'increase(coinpoet_amazon_searches_total{status="error",instance="gpupoet.com"}[1h]) > 4'
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: Multiple Amazon search failures in the last hour
                  description: More than 4 Amazon search errors in 1 hour. Check proxy config and amazon-searcher service.
              - alert: AmazonSearchStale
                expr: '(time() - coinpoet_amazon_last_success_timestamp_seconds{instance="gpupoet.com"}) > 7200'
                for: 30m
                labels:
                  severity: critical
                annotations:
                  summary: No successful Amazon searches in over 2 hours
                  description: Amazon searching has not succeeded in over 2 hours. Check amazon-searcher pod logs.
          - name: gpu-poet-collector
            rules:
              - alert: CollectorDown
                expr: 'up{job="gpu_poet_collector"} < 1.0'
                for: 30m
                labels:
                  severity: warning
                annotations:
                  summary: gpu-poet-collector /metrics endpoint is not reachable.
              - alert: CollectorGitPushStalled
                # 8 days = 7-day cadence + 1d slack. Only fires after a full
                # cycle has been missed.
                expr: '(time() - collector_last_git_push_timestamp_seconds) > 691200'
                for: 1h
                labels:
                  severity: warning
                annotations:
                  summary: gpu-poet-collector has not pushed cache updates to git in over 8 days.
              - alert: CollectorHighErrorRate
                # >5% of fetches are landing in the not-found bucket (404/error/unparseable)
                # over the past hour — gpumagick may be blocking us or the parser is broken.
                expr: 'rate(collector_furmark_fetches_total{outcome="notfound"}[1h]) / clamp_min(sum(rate(collector_furmark_fetches_total[1h])), 0.001) > 0.05'
                for: 1h
                labels:
                  severity: warning
                annotations:
                  summary: gpu-poet-collector FurMark fetch error rate >5% over the last hour.
          - name: tayle
            rules:
              - alert: PodNotReady
                expr: 'kube_pod_status_ready{exported_namespace="tayle-prod",pod!~"^db-backup-.*",condition="false"} > 0'
                labels:
                  severity: warning
                annotations:
                  summary: >-
                    Tayle Pod not ready. See https://grafana.activescott.com/d/cc030cf0-cde1-46c1-bc49-fd5c88d7f002/tayle-prod-status
              - alert: DeploymentNotAvailable
                expr: 'kube_deployment_status_condition{exported_namespace="tayle-prod",condition="Available",status="false"} > 0'
                labels:
                  severity: critical
                annotations:
                  summary: >-
                    Tayle Deployment not available. See https://grafana.activescott.com/d/cc030cf0-cde1-46c1-bc49-fd5c88d7f002/tayle-prod-status
              - alert: StatefulSetNotReady
                expr: 'kube_statefulset_status_replicas_ready{exported_namespace="tayle-prod"} == 0'
                labels:
                  severity: critical
                annotations:
                  summary: >-
                    Tayle StatefulSet has no ready replicas. See https://grafana.activescott.com/d/cc030cf0-cde1-46c1-bc49-fd5c88d7f002/tayle-prod-status
          - name: tinkerbell-llm-providers
            rules:
              # Critical: an LLM provider returned 402 Payment Required.
              # This is the credit-balance-too-low case that took prod silent.
              # Single occurrence fires — customer impact is total.
              - alert: LLMProviderPaymentRequired
                expr: 'increase(tinkerbell_llm_provider_errors_total{error_type="payment"}[5m]) > 0'
                for: 1m
                labels:
                  severity: critical
                annotations:
                  summary: 'LLM provider {{ $labels.provider }} returned a payment error — top up the account.'
                  description: 'tinkerbell_llm_provider_errors_total{error_type=payment, provider={{ $labels.provider }}, status_code={{ $labels.status_code }}} increased. Chat is silently failing for users. Top up at console.anthropic.com (or the relevant provider) immediately.'
              - alert: LLMProviderRateLimited
                expr: 'rate(tinkerbell_llm_provider_errors_total{error_type="rate_limit"}[10m]) > 0.05'
                for: 10m
                labels:
                  severity: warning
                annotations:
                  summary: 'LLM provider {{ $labels.provider }} is rate-limiting requests.'
                  description: 'Sustained 429s from {{ $labels.provider }} — chat experience is degraded. Consider lowering request volume or upgrading the plan.'
              - alert: LLMProviderErrorSpike
                expr: 'rate(tinkerbell_llm_provider_errors_total{error_type!~"payment|rate_limit"}[10m]) > 0.1'
                for: 10m
                labels:
                  severity: warning
                annotations:
                  summary: 'LLM provider {{ $labels.provider }} error rate elevated ({{ $labels.error_type }}).'
                  description: 'Errors for {{ $labels.provider }} bucket={{ $labels.error_type }} status={{ $labels.status_code }} above threshold. Investigate provider status page and recent deploys.'
          - name: tinkerbell-proxy
            rules:
              # Critical: payment-classified proxy errors. The fetch tool
              # refines OxyLabs 407s using the X-Error-Description header
              # — when the response mentions traffic/bandwidth/limit/balance
              # we land here. Indicates the OxyLabs subscription is out of
              # paid bandwidth.
              - alert: ProxyOutOfBandwidth
                expr: 'increase(tinkerbell_proxy_errors_total{error_type="payment"}[5m]) > 0'
                for: 1m
                labels:
                  severity: critical
                annotations:
                  summary: 'Proxy {{ $labels.proxy }} reports out-of-bandwidth/billing failure — fetch path is broken.'
                  description: 'tinkerbell_proxy_errors_total{error_type=payment, proxy={{ $labels.proxy }}} fired. OxyLabs returned a 4xx with X-Error-Description matching traffic/bandwidth/quota/balance. Top up the OxyLabs plan or check billing immediately.'
              - alert: ProxyAuthFailing
                expr: 'increase(tinkerbell_proxy_errors_total{error_type="auth"}[5m]) > 3'
                for: 5m
                labels:
                  severity: critical
                annotations:
                  summary: 'Proxy {{ $labels.proxy }} is rejecting authentication.'
                  description: 'Multiple 407 responses from {{ $labels.proxy }} in the last 5 minutes. Verify OXYLABS_USERNAME/OXYLABS_PASSWORD secrets and whitelisted IPs in the OxyLabs dashboard.'
              - alert: ProxyConnectionFailures
                expr: 'rate(tinkerbell_proxy_errors_total{error_type="connection"}[10m]) > 0.1'
                for: 10m
                labels:
                  severity: warning
                annotations:
                  summary: 'Proxy {{ $labels.proxy }} connection failures elevated.'
                  description: 'Sustained ETIMEDOUT/ECONNREFUSED/ERR_TUNNEL errors against {{ $labels.proxy }} — could be transient network or a hard-down OxyLabs account.'
          - name: tinkerbell-scrape-health
            rules:
              # Meta-alert: catches the case where /metrics is unreachable
              # so the alerts above don't go silent during a real outage.
              - alert: TinkerbellAppMetricsDown
                expr: 'up{job="tinkerbell_app"} < 1'
                for: 10m
                labels:
                  severity: warning
                annotations:
                  summary: 'Cannot scrape /metrics from tinkerbell app pod.'
                  description: 'Prometheus has been unable to scrape app.tinkerbell-prod.svc.cluster.local:3100/metrics for 10 minutes. Without this, LLM and proxy alerts will not fire. Check pod health and the /metrics route.'

    # --- Extra Scrape Configs ---
    extraScrapeConfigs: |
      - job_name: "gpupoet_cache_metrics"
        scrape_interval: 10s
        scrape_timeout: 10s
        metrics_path: "/ops/metrics"
        static_configs:
          - targets: ["gpupoet.com"]
      - job_name: "gpu_poet_collector"
        scrape_interval: 30s
        scrape_timeout: 10s
        metrics_path: "/metrics"
        static_configs:
          - targets: ["gpu-poet-collector.gpupoet-prod.svc.cluster.local:9100"]
      - job_name: "tinkerbell_app"
        scrape_interval: 30s
        scrape_timeout: 10s
        metrics_path: "/metrics"
        static_configs:
          - targets: ["app.tinkerbell-prod.svc.cluster.local:3100"]
      - job_name: "prometheus self scrape"
        static_configs:
          - targets: ["localhost:9090"]

    # Without this sidecar, scrape and alert-rule edits silently fail to take
    # effect: Helm only rolls pods on Deployment-spec changes, not on child
    # ConfigMap content changes, so the rendered ConfigMap drifts ahead of
    # the long-running pod's in-memory config until something forces a
    # restart. Burned us on 2026-05-17 — a payment-error alert PR appeared
    # to deploy successfully but didn't actually arm until /-/reload was hit
    # manually.
    configmapReload:
      prometheus:
        enabled: true

    # --- Sub-charts ---
    kube-state-metrics:
      enabled: true

    prometheus-node-exporter:
      enabled: true

    prometheus-pushgateway:
      enabled: false
