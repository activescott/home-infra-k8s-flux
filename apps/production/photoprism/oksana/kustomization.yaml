resources:
  - namespace.yaml
  - ../../../base/photoprism

secretGenerator:
  # this secret configures much of mariadb
  - name: mariadb-creds
    envs:
      # this file is in 1Password
      - .env.secret.mariadb-creds.encrypted

patches:
  - path: patch-mariadb-volume.yaml
  # TEMPORARY: skip system-db backup so mariadb-upgrade can run despite
  # corrupt mysql.proc index. Remove after upgrade lands. See plan.md.
  - path: patch-mariadb-env-skip-backup.yaml
  - path: patch-photoprism-statefulset.yaml
  - path: patch-photoprism-ingress.yaml

namespace: photoprism-oksana

labels:
  - pairs:
      app.activescott.com/tenant: oksana
