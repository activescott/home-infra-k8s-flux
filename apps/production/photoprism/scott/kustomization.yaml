resources:
  - namespace.yaml
  - ../../../base/photoprism

secretGenerator:
  # this secret configures much of mariadb
  - name: mariadb-creds
    envs:
      # this file is in 1Password
      - .env.secret.mariadb-creds.encrypted

patches:
  - path: patch-mariadb-volume.yaml
  # TEMPORARY: stop crashloop caused by duplicate-user mariadb-upgrade
  # failure. Remove after deleting the dup row in mysql.user.
  - path: patch-mariadb-skip-upgrade.yaml
  # EMERGENCY: REPAIR TABLE dropped valid user rows; need skip-grant-tables
  # to recreate them. Remove ASAP after recreation.
  - path: patch-mariadb-skip-grant.yaml
  - path: patch-photoprism-statefulset.yaml
  - path: patch-photoprism-ingress.yaml

namespace: photoprism-scott

labels:
  - pairs:
      app.activescott.com/tenant: scott
