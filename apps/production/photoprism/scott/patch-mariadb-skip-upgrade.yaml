# TEMPORARY recovery patch. Remove after manually fixing duplicate
# mysql.user rows and letting mariadb-upgrade complete on the next
# reconcile.
#
# Background: scott's mariadb-0 enters CrashLoopBackOff during 10.8 ->
# 10.11 because mariadb-upgrade fails at Phase 3 with:
#   "Multiple accounts exist for @user_name, @host_name that differ
#    only in Host lettercase; remove all except one of them"
#   "FATAL ERROR: Upgrade failed"
# When the entrypoint's mariadb-upgrade exits non-zero, the entrypoint
# calls mysql_error and exits 1 -> crashloop.
#
# This patch sets MARIADB_AUTO_UPGRADE="0" which bypasses the upgrade
# step entirely, letting the 10.11 binary serve the (un-upgraded but
# usable) 10.8-format datadir. While the pod is stable, the operator
# execs in, identifies the duplicate user row in mysql.user, deletes
# it, then removes this patch so the next reconcile runs the upgrade
# successfully.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
spec:
  template:
    spec:
      containers:
        - name: mariadb
          env:
            - name: MARIADB_AUTO_UPGRADE
              value: "0"
