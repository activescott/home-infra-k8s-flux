apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/traefik-redirect/
  - ./namespace.yaml

namespace: activescott-redirect
namePrefix: activescott-

configMapGenerator:
  - name: redirect-vars
    literals:
      - HOST=activescott.com
      - REGEX=^https?://activescott\.com/.*
      - REPLACEMENT=https://scott.willeke.com/
      - MIDDLEWARE_REF=activescott-redirect-activescott-redirect-middleware@kubernetescrd
      - TLS_SECRET=activescott-com-tls

# Replacements inject ConfigMap values into Middleware and Ingress
replacements:
  - source:
      kind: ConfigMap
      name: redirect-vars
      fieldPath: data.HOST
    targets:
      - select:
          kind: Ingress
          name: redirect-ingress
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
  - source:
      kind: ConfigMap
      name: redirect-vars
      fieldPath: data.REGEX
    targets:
      - select:
          kind: Middleware
          name: redirect-middleware
        fieldPaths:
          - spec.redirectRegex.regex
  - source:
      kind: ConfigMap
      name: redirect-vars
      fieldPath: data.REPLACEMENT
    targets:
      - select:
          kind: Middleware
          name: redirect-middleware
        fieldPaths:
          - spec.redirectRegex.replacement
  - source:
      kind: ConfigMap
      name: redirect-vars
      fieldPath: data.MIDDLEWARE_REF
    targets:
      - select:
          kind: Ingress
          name: redirect-ingress
        fieldPaths:
          - metadata.annotations.[traefik.ingress.kubernetes.io/router.middlewares]
  - source:
      kind: ConfigMap
      name: redirect-vars
      fieldPath: data.TLS_SECRET
    targets:
      - select:
          kind: Ingress
          name: redirect-ingress
        fieldPaths:
          - spec.tls.0.secretName

# NOTE: adding `managedByLabel` here causes a label like `app.kubernetes.io/managed-by: kustomize-(devel)` to be added and `kustomize-(devel)` gets rejected by k8s server side.
buildMetadata: [originAnnotations, transformerAnnotations]
