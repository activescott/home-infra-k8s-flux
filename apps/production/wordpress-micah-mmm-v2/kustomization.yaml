apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Tenant overlay for Micah's Meticulous Mowing
# (mmm.willeke.com), using the new upstream WordPress base.
# This overlay coexists with the legacy Bitnami-chart-based
# `wordpress-micah-mmm` namespace until cutover. See
# docs/specs/wordpress-micah-mmm-migrate-off-bitnami/ for the
# full migration plan and host-side runbook.

namespace: wordpress-micah-mmm-v2

resources:
  - namespace.yaml
  - ../../base/wordpress-upstream
  - pv.yaml
  - pvc.yaml
  - ingress.yaml

secretGenerator:
  - name: wordpress-creds
    envs:
      - .env.secret.wordpress-creds.encrypted

patches:
  # Override the WP site URL via wp-config.php constants. Needed because
  # wp_options.{home,siteurl} in the migrated DB still carry the default
  # `https://127.0.0.1` placeholder from initial install; the legacy
  # Bitnami chart hard-coded WP_HOME/WP_SITEURL in its generated
  # wp-config.php to mask that, and the upstream image doesn't.
  - path: patch-wordpress-config-extra.yaml

labels:
  - pairs:
      app.activescott.com/name: wordpress
      app.activescott.com/tenant: micah
      app.activescott.com/migration: v2
