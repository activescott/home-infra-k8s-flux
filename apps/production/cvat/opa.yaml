# Open Policy Agent: CVAT's authorization engine. Polls its policy bundle from the
# CVAT server itself, so it comes up degraded until cvat-server is ready — that's fine.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cvat-opa
  labels:
    app: cvat
    role: opa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cvat
      role: opa
  template:
    metadata:
      labels:
        app: cvat
        role: opa
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:1.12.2
          args:
            - run
            - --server
            - --addr=:8181
            - --log-level=error
            - --set=services.cvat.url=http://cvat-server:8080
            - --set=bundles.cvat.service=cvat
            - --set=bundles.cvat.resource=/api/auth/rules
            - --set=bundles.cvat.polling.min_delay_seconds=5
            - --set=bundles.cvat.polling.max_delay_seconds=15
          ports:
            - name: opa
              containerPort: 8181
          resources:
            requests:
              memory: "64Mi"
            limits:
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cvat-opa
  labels:
    app: cvat
    role: opa
spec:
  selector:
    app: cvat
    role: opa
  ports:
    - name: opa
      port: 8181
      targetPort: opa
