apiVersion: apps/v1
kind: Deployment
metadata:
  name: cvat-server
  labels:
    app: cvat
    role: server
spec:
  replicas: 1
  # `init` runs Django migrations on start; never run two servers concurrently
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cvat
      role: server
  template:
    metadata:
      labels:
        app: cvat
        role: server
    spec:
      containers:
        - name: cvat-server
          image: cvat/server:v2.44.3
          args:
            - init
            - run
            - server
            - nginx
          envFrom:
            - configMapRef:
                name: cvat-backend-config
            - secretRef:
                name: cvat-secrets
          env:
            - name: DJANGO_MODWSGI_EXTRA_ARGS
              value: ""
            - name: ADAPTIVE_AUTO_ANNOTATION
              value: "false"
            - name: NUMPROCS
              value: "2"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/server/about
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "4Gi"
          volumeMounts:
            - mountPath: /home/django/data
              name: cvat-data
            - mountPath: /home/django/keys
              name: cvat-keys
            - mountPath: /home/django/logs
              name: cvat-logs
            - mountPath: /home/django/share/originals
              name: steward-share
              readOnly: true
      volumes:
        # CVAT media/data (uploaded images, chunk cache) lives with the steward photo
        # tree; internals (keys/logs) live under app-data. See docs/specs/cvat-hosting/.
        - name: cvat-data
          hostPath:
            path: /mnt/thedatapool/photos/steward/cvat
        - name: cvat-keys
          hostPath:
            path: /mnt/thedatapool/app-data/cvat/keys
        - name: cvat-logs
          hostPath:
            path: /mnt/thedatapool/app-data/cvat/logs
        # "Connected file share" source: original captures written by the Mac. Must be
        # mounted on the server AND every worker that touches media — chunks are built
        # lazily by the chunks worker and 500 with FileNotFoundError without it.
        - name: steward-share
          hostPath:
            path: /mnt/thedatapool/photos/steward/originals
---
apiVersion: v1
kind: Service
metadata:
  name: cvat-server
  labels:
    app: cvat
    role: server
spec:
  selector:
    app: cvat
    role: server
  ports:
    - name: http
      port: 8080
      targetPort: http
