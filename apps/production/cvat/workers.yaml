# One deployment per CVAT RQ worker (mirrors upstream docker-compose.yml; the
# consensus worker is omitted — feature unused). Every worker mounts the same four
# volumes as the server: data/keys/logs plus the read-only steward share. The share
# mount on ALL media workers is load-bearing — chunks are built lazily by the chunks
# worker and frames past the first chunk 500 with FileNotFoundError without it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cvat-worker-utils
  labels:
    app: cvat
    role: worker-utils
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cvat
      role: worker-utils
  template:
    metadata:
      labels:
        app: cvat
        role: worker-utils
    spec:
      containers:
        - name: worker
          image: cvat/server:v2.44.3
          args: [run, worker, notifications, cleaning]
          envFrom:
            - configMapRef:
                name: cvat-backend-config
            - secretRef:
                name: cvat-secrets
          env:
            - name: NUMPROCS
              value: "1"
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "1Gi"
          volumeMounts:
            - { mountPath: /home/django/data, name: cvat-data }
            - { mountPath: /home/django/keys, name: cvat-keys }
            - { mountPath: /home/django/logs, name: cvat-logs }
            - { mountPath: /home/django/share/originals, name: steward-share, readOnly: true }
      volumes:
        - { name: cvat-data, hostPath: { path: /mnt/thedatapool/photos/steward/cvat } }
        - { name: cvat-keys, hostPath: { path: /mnt/thedatapool/app-data/cvat/keys } }
        - { name: cvat-logs, hostPath: { path: /mnt/thedatapool/app-data/cvat/logs } }
        - { name: steward-share, hostPath: { path: /mnt/thedatapool/photos/steward/originals } }
---
