# The chart always reads CVAT_REDIS_INMEM_PASSWORD / CVAT_REDIS_ONDISK_PASSWORD from
# a secret, but this deployment's redis and kvrocks run without auth (cluster-internal
# only), so the "password" is deliberately empty — nothing secret here.
apiVersion: v1
kind: Secret
metadata:
  name: cvat-cache-auth
type: Opaque
stringData:
  password: ""
