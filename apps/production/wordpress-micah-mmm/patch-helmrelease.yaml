apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wordpress
spec:
  timeout: 10m
  values:
    wordpressBlogName: "Micah's Meticulous Mowing"
    wordpressUsername: micah
    existingSecret: wordpress-creds

    service:
      type: ClusterIP

    ingress:
      enabled: true
      hostname: mmm.willeke.com
      tls: true
      extraTls:
        - hosts:
            - mmm.willeke.com
          secretName: mmm-willeke-com-tls
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production

    persistence:
      existingClaim: wordpress-micah-mmm-wp-pvc

    # Pin wordpress image by digest rather than the chart's :latest default
    # so cluster state stops depending on whatever Bitnami currently points
    # latest at (and so we get a real before/after diff on upgrades). This
    # digest is what is running in the cluster as of 2026-05-30:
    #   WordPress 6.9.1 on Photon OS 5 (bitnami/wordpress:latest at that time)
    image:
      digest: "sha256:a767c9fcab3eb2c140c791fb0095b575cb9696ea1732972bc8e0b522194f68a1"

    mariadb:
      # Bumped from sha256:3092b0b7... (which is no longer pullable from
      # the public Bitnami registry due to their Aug-2025 secure-images
      # distribution change — only :latest stays public) to the current
      # :latest amd64 sub-digest. Resolved version is still MariaDB 12.2.2;
      # the new image is the same MariaDB minor.patch built on a fresh
      # Photon OS 5 base layer (2026-05-30 build). No DB engine version
      # change, no schema migration. The motivation is to restore the
      # ability to reschedule the pod from the public registry without
      # relying on the node's local image cache.
      image:
        digest: "sha256:be1cefc3af0bbfc5d359dc1fde74f0d573a1ec6cb8ec7b50375708bfcf1d8eee"
      primary:
        persistence:
          existingClaim: wordpress-micah-mmm-mariadb-pvc
