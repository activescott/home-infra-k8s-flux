apiVersion: batch/v1
kind: CronJob
metadata:
  name: cache-revalidation
spec:
  # Run every 10 minutes to support both eBay and Amazon listing revalidation.
  #
  # eBay: Refreshes all stale GPUs (6-hour TTL via CACHED_LISTINGS_DURATION_MS).
  #   More frequent runs are safe — eBay staleness checks prevent unnecessary API calls.
  #   eBay API budget: 5,000 calls/day. Normal usage: ~230 calls per stale run.
  #
  # Amazon: Refreshes only 1 GPU per run (anti-bot measure).
  #   With ~75 GPUs, takes ~12.5 hours to cycle through all at 10-min intervals.
  #   The amazon-searcher service handles the actual scraping via Playwright/Firefox.
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      # 9-minute deadline prevents overlapping with the next 10-minute cron run
      activeDeadlineSeconds: 540
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cache-revalidation
              # Use lightweight curl image for simple HTTP requests
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Starting cache revalidation job..."

                  # Call the internal revalidate-cache endpoint
                  if curl -f -X POST -w "Status: %{http_code}\n" http://app:3000/ops/revalidate-cache; then
                    echo "Cache revalidation completed successfully"
                  else
                    echo "Cache revalidation failed"
                    exit 1
                  fi

              # https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
              resources:
                limits:
                  cpu: "0.1"
                  memory: "100Mi"
                requests:
                  cpu: "0.05"
                  memory: "50Mi"
