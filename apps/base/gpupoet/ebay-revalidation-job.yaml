apiVersion: batch/v1
kind: CronJob
metadata:
  name: ebay-revalidation
spec:
  # Run every 20 minutes for eBay listing revalidation.
  #
  # Refreshes up to 4 stale GPUs per run (6-hour TTL).
  #   With ~75 GPUs, cycles through all in ~6 hours.
  #   eBay API budget: 5,000 calls/day. 4 GPUs/run ≈ 900-1050 calls/day (~20% of budget).
  schedule: "*/20 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      # 18-minute deadline prevents overlapping with the next 20-minute cron run
      activeDeadlineSeconds: 1080
      # Only retry once on failure. Each retry triggers a full revalidation cycle
      # (eBay queries), wasting API budget. Better to wait for the
      # next cron run in 20 minutes than burn through retries.
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: ebay-revalidation
              # Use lightweight curl image for simple HTTP requests
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Starting eBay revalidation job..."

                  # Call the internal revalidate-ebay endpoint
                  if curl -f -X POST -w "Status: %{http_code}\n" http://app:3000/ops/revalidate-ebay; then
                    echo "eBay revalidation completed successfully"
                  else
                    echo "eBay revalidation failed"
                    exit 1
                  fi

              # https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
              resources:
                limits:
                  cpu: "0.1"
                  memory: "100Mi"
                requests:
                  cpu: "0.05"
                  memory: "50Mi"
