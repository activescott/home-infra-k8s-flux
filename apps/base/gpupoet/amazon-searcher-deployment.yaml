apiVersion: apps/v1
kind: Deployment
metadata:
  name: amazon-searcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amazon-searcher
  template:
    metadata:
      labels:
        app: amazon-searcher
    spec:
      containers:
        - name: amazon-searcher
          image: amazon-searcher-image-placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: OXYLABS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: OXYLABS_USERNAME
                  optional: true
            - name: OXYLABS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-creds
                  key: OXYLABS_PASSWORD
                  optional: true
            - name: PORT
              value: "3001"
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
            requests:
              cpu: "0.5"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
