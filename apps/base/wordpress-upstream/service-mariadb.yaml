apiVersion: v1
kind: Service
metadata:
  name: mariadb
  labels:
    app: wordpress
    role: mariadb
spec:
  # Headless: gives the StatefulSet's lone pod a stable in-namespace
  # DNS name `mariadb` reachable from the wordpress Deployment.
  clusterIP: None
  selector:
    app: wordpress
    role: mariadb
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
